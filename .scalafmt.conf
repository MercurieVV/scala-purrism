version = "3.8.6"
runner.dialect = scala3

# Fixtures are data, not source. An expected-output file must match what a rule
# actually emits, byte for byte, so reformatting one breaks the very comparison
# it exists for. Input fixtures are excluded too: some deliberately hold badly
# formatted or smelly code for a rule to act on.
project.excludePaths = [
  "glob:**/scalafix/testInput/**"
  "glob:**/scalafix/testOutput/**"
  "glob:**/scalafix/test/resources/golden/**"
]
